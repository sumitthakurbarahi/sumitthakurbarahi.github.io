        <!-- #CONTACT -->

        <article class="contact active " data-page="contact">
          <header>
            <h2 class="h2 article-title">Contact</h2>
          </header>

          <h3 class="h3 form-title">My Location</h3>
          <section class="mapbox" data-mapbox>
             <figure>
              <iframe
                src="https://www.google.com/maps/place/Institute+of+Engineering,+Pulchowk+Campus/@27.6810911,85.3159199,17z/data=!3m1!4b1!4m6!3m5!1s0x39eb19cbf6b89eb7:0x951b3c8ac733e3ec!8m2!3d27.6810911!4d85.3184948!16s%2Fg%2F11c494jtbg?entry=ttu&g_ep=EgoyMDI0MTAxNC4wIKXMDSoASAFQAw%3D%3D"
                width="400"
                height="300"
                loading="lazy"
              ></iframe>
            </figure> 
          </section>

          <section class="contact-form">
            <h3 class="h3 form-title">Contact Form</h3>

            <form action="#" class="form" data-form>
              <div class="input-wrapper">
                <input
                  type="text"
                  name="fullname"
                  class="form-input"
                  placeholder="Full name"
                  required
                  data-form-input
                />

                <input
                  type="email"
                  name="email"
                  class="form-input"
                  placeholder="Email address"
                  required
                  data-form-input
                />
              </div>

              <textarea
                name="message"
                class="form-input"
                placeholder="Your Message"
                required
                data-form-input
              ></textarea>

              <button class="form-btn" type="submit" disabled data-form-btn>
                <ion-icon name="paper-plane"></ion-icon>
                <span>Send Message</span>
              </button>
            </form>
          </section>
        </article>
